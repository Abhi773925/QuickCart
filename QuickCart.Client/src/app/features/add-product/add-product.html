<div class="min-h-screen bg-white flex items-center justify-center p-4">
  <div class="w-full max-w-2xl">
    <h1 class="text-3xl font-bold text-slate-900 mb-8">Add New Product</h1>
    
    <form [formGroup]="productForm" (ngSubmit)="handleProductForm()" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Product Name</label>
        <input type="text" formControlName="ProductName" placeholder="e.g. Smart Watch"
          class="w-full px-3 py-2 border border-slate-200 rounded text-sm focus:outline-none focus:border-slate-900" />
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Category</label>
          <select formControlName="CategoryId" class="w-full px-3 py-2 border border-slate-200 rounded text-sm focus:outline-none focus:border-slate-900 bg-white cursor-pointer">
            <option value="" disabled selected>Select</option>
            <option *ngFor="let cat of categories" [value]="cat.categoryId">{{ cat.categoryName }}</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Price</label>
          <input type="number" formControlName="ProductPrice" placeholder="0.00"
            class="w-full px-3 py-2 border border-slate-200 rounded text-sm focus:outline-none focus:border-slate-900" />
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Stock Quantity</label>
        <input type="number" formControlName="StockQuantity" placeholder="100"
          class="w-full px-3 py-2 border border-slate-200 rounded text-sm focus:outline-none focus:border-slate-900" />
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Image URL</label>
        <input type="text" formControlName="ImageUrl" placeholder="https://..."
          class="w-full px-3 py-2 border border-slate-200 rounded text-sm focus:outline-none focus:border-slate-900" />
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Description</label>
        <textarea rows="4" formControlName="ProductDescription" placeholder="Enter details..."
          class="w-full px-3 py-2 border border-slate-200 rounded text-sm focus:outline-none focus:border-slate-900 resize-none"></textarea>
      </div>

      @if(errorText()) {
        <div class="text-sm text-red-600 bg-red-50 p-3 rounded border border-red-200">{{ errorText() }}</div>
      }

      <div class="flex gap-3 pt-4">
        <button type="button" (click)="productForm.reset()" class="px-4 py-2 border border-slate-200 text-slate-900 text-sm font-medium hover:bg-slate-50 transition-colors cursor-pointer rounded">
          Reset
        </button>
        <button type="submit" [disabled]="productForm.invalid" class="px-4 py-2 bg-slate-900 text-white text-sm font-medium hover:bg-slate-800 disabled:bg-slate-400 transition-colors cursor-pointer rounded">
          Save Product
        </button>
      </div>
    </form>
  </div>
</div>
