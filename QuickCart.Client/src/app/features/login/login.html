<div class="min-h-screen bg-white flex items-center justify-center p-4">
  <div class="w-full max-w-sm">
    <h1 class="text-2xl font-bold mb-6 text-slate-900">Login</h1>
    
    <form class="space-y-4" [formGroup]="loginForm" (ngSubmit)="handleLoginForm()">
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Email</label>
        <input type="email" formControlName="email" placeholder="you@example.com"
          class="w-full px-3 py-2 border border-slate-200 rounded text-sm focus:outline-none focus:border-slate-900" />
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Password</label>
        <input type="password" formControlName="password" placeholder="••••••••"
          class="w-full px-3 py-2 border border-slate-200 rounded text-sm focus:outline-none focus:border-slate-900" />
      </div>

      <button type="submit" class="w-full py-2 bg-slate-900 text-white text-sm font-medium hover:bg-slate-800 transition cursor-pointer">
        Login
      </button>
    </form>

    <p class="text-center text-sm text-slate-600 mt-4">
      Don't have an account? <a routerLink="/register" class="text-slate-900 font-medium hover:underline cursor-pointer">Sign up</a>
    </p>
  </div>
</div>
