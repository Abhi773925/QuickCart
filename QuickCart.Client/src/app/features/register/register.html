<div class="min-h-screen bg-white flex items-center justify-center p-4">
  <div class="w-full max-w-sm">
    <h1 class="text-2xl font-bold mb-6 text-slate-900">Sign Up</h1>
    
    @if(errorText.length > 0) {
      <p class="text-sm text-red-600 mb-4">{{ errorText }}</p>
    }
    @if(successText.length > 0) {
      <p class="text-sm text-green-600 mb-4">{{ successText }}</p>
    }

    <form class="space-y-4" [formGroup]="registerDetails" (ngSubmit)="handleRegisterDetails()">
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Name</label>
        <input type="text" formControlName="userName" placeholder="Your name"
          class="w-full px-3 py-2 border border-slate-200 rounded text-sm focus:outline-none focus:border-slate-900" />
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Email</label>
        <input type="email" formControlName="userEmail" placeholder="you@example.com"
          class="w-full px-3 py-2 border border-slate-200 rounded text-sm focus:outline-none focus:border-slate-900" />
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Password</label>
        <input type="password" formControlName="userPassword" placeholder="••••••••"
          class="w-full px-3 py-2 border border-slate-200 rounded text-sm focus:outline-none focus:border-slate-900" />
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Role</label>
        <select formControlName="userRole" class="w-full px-3 py-2 border border-slate-200 rounded text-sm focus:outline-none focus:border-slate-900 bg-white cursor-pointer">
          <option value="" disabled selected>Select role</option>
          @for (role of roleOptions; track role.value) {
            <option [value]="role.value">{{ role.name }}</option>
          }
        </select>
      </div>

      <button type="submit" [disabled]="registerDetails.invalid" class="w-full py-2 bg-slate-900 text-white text-sm font-medium hover:bg-slate-800 disabled:bg-slate-400 transition cursor-pointer">
        Create Account
      </button>
    </form>

    <p class="text-center text-sm text-slate-600 mt-4">
      Already have an account? <a routerLink="/login" class="text-slate-900 font-medium hover:underline cursor-pointer">Login</a>
    </p>
  </div>
</div>
