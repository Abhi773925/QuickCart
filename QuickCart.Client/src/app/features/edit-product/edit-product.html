<div class="min-h-screen bg-white px-4 py-8 md:px-6">
  <div class="mx-auto max-w-2xl">
    <div class="mb-6">
      <p class="text-xs uppercase tracking-[0.3em] text-slate-400">Admin Panel</p>
      <h1 class="mt-2 text-2xl font-semibold text-slate-900">Edit Product</h1>
      <p class="mt-1 text-sm text-slate-500">Update product details in a clean, minimal layout.</p>
    </div>

    <div class="rounded-2xl border border-slate-200 bg-slate-50 p-5 md:p-6">
      <form [formGroup]="productDetailsForm" (ngSubmit)="handleForm()" class="space-y-4">
        <div>
          <label class="mb-1.5 block text-sm font-medium text-slate-700">Product Name</label>
          <input type="text" formControlName="ProductName" placeholder="Product name"
            class="w-full rounded-lg border border-slate-200 bg-white px-4 py-3 text-sm text-slate-900 outline-none transition focus:border-slate-900" />
        </div>

        <div>
          <label class="mb-1.5 block text-sm font-medium text-slate-700">Description</label>
          <textarea rows="4" formControlName="ProductDescription" placeholder="Product description"
            class="w-full resize-none rounded-lg border border-slate-200 bg-white px-4 py-3 text-sm text-slate-900 outline-none transition focus:border-slate-900"></textarea>
        </div>

        <div class="grid gap-4 md:grid-cols-2">
          <div>
            <label class="mb-1.5 block text-sm font-medium text-slate-700">Price</label>
            <input type="number" formControlName="ProductPrice" placeholder="0"
              class="w-full rounded-lg border border-slate-200 bg-white px-4 py-3 text-sm text-slate-900 outline-none transition focus:border-slate-900" />
          </div>
          <div>
            <label class="mb-1.5 block text-sm font-medium text-slate-700">Stock</label>
            <input type="number" formControlName="StockQuantity" placeholder="0"
              class="w-full rounded-lg border border-slate-200 bg-white px-4 py-3 text-sm text-slate-900 outline-none transition focus:border-slate-900" />
          </div>
        </div>

        <div>
          <label class="mb-1.5 block text-sm font-medium text-slate-700">Image URL</label>
          <input type="text" formControlName="ImageUrl" placeholder="https://..."
            class="w-full rounded-lg border border-slate-200 bg-white px-4 py-3 text-sm text-slate-900 outline-none transition focus:border-slate-900" />
        </div>
        <div class="flex gap-3 pt-2">
          <button type="button" (click)="productDetailsForm.reset()"
            class="cursor-pointer border border-slate-200 px-4 py-2.5 text-sm font-medium text-slate-700 transition hover:bg-slate-100">
            Reset
          </button>
          <button type="submit" (click)="updateProduct()"
            class="cursor-pointer bg-slate-900 px-4 py-2.5 text-sm font-medium text-white transition hover:bg-slate-800">
            Save Changes
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
