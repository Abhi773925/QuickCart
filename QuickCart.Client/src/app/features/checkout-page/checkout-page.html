<div class="min-h-screen bg-white flex items-center justify-center p-4">
  <div class="w-full max-w-sm">
    <form class="space-y-6">
      
      <div>
        <div class="flex items-center justify-between mb-2">
          <label class="text-xs text-slate-600">Delivery Address</label>
          <button type="button" (click)="fetchLocation()" 
                  class="text-xs text-blue-600 hover:text-blue-700 flex items-center gap-1">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" [class.animate-spin]="isLocating()" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
            </svg>
            {{ isLocating() ? 'Locating...' : 'Detect' }}
          </button>
        </div>
        <input 
          type="text" 
          [value]="shippingAddress()" 
          (input)="onAddressInput($event)"
          class="w-full px-3 py-2 border border-slate-200 rounded text-sm focus:outline-none focus:border-slate-500"
          placeholder="Enter your address" />
      </div>

      <button 
        (click)="placeOrder()"
        type="button"
        class="w-full py-2 bg-slate-900 text-white text-xs font-medium hover:bg-slate-800 transition-colors">
        Place Order
      </button>

    </form>
  </div>
</div>
